services:
  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: kokoro-tts
    ports:
      - '8880:8880'
    volumes:
      - kokoro-models:/app/api/src/voices
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8880/v1/audio/voices']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  kokoro-models:
