<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="760"
  viewBox="0 0 1200 760"
  fill="none"
>
  <defs>
    <linearGradient id="bg" x1="72" y1="18" x2="1110" y2="720">
      <stop offset="0" stop-color="#FFF8F1" />
      <stop offset="1" stop-color="#F1D3C2" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DA7756" />
      <stop offset="1" stop-color="#EFA27A" />
    </linearGradient>
    <linearGradient id="panel" x1="284" y1="198" x2="874" y2="612">
      <stop offset="0" stop-color="#2B2421" />
      <stop offset="1" stop-color="#171311" />
    </linearGradient>
    <filter
      id="sceneShadow"
      x="122"
      y="168"
      width="958"
      height="470"
      filterUnits="userSpaceOnUse"
      color-interpolation-filters="sRGB"
    >
      <feDropShadow dx="0" dy="20" stdDeviation="24"
        flood-color="#8E6452" flood-opacity="0.16" />
    </filter>
    <filter
      id="duoShadow"
      x="212"
      y="188"
      width="690"
      height="460"
      filterUnits="userSpaceOnUse"
      color-interpolation-filters="sRGB"
    >
      <feDropShadow dx="0" dy="18" stdDeviation="18"
        flood-color="#0D0908" flood-opacity="0.22" />
    </filter>
  </defs>

  <rect width="1200" height="760" rx="36" fill="url(#bg)" />

  <text
    x="102"
    y="90"
    fill="#2D221E"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34"
    font-weight="700"
  >
    Open the outline when you need it. Hide it when you do not.
  </text>
  <text
    x="102"
    y="126"
    fill="#6C5950"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="18"
  >
    The hierarchy stays readable on long papers and articles, highlights the current
  </text>
  <text
    x="102"
    y="152"
    fill="#6C5950"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="18"
  >
    section, and keeps scrolling inside its own panel.
  </text>

  <g filter="url(#sceneShadow)">
    <rect x="154" y="196" width="894" height="394" rx="30" fill="#FBF3EC" />
  </g>

  <g filter="url(#duoShadow)">
    <rect x="260" y="220" width="332" height="350" rx="28" fill="url(#panel)" />
    <rect x="260" y="220" width="332" height="4" rx="2" fill="url(#accent)" />
    <rect x="610" y="220" width="208" height="380" rx="28" fill="url(#panel)" />
    <rect x="610" y="220" width="208" height="4" rx="2" fill="url(#accent)" />

    <text
      x="288"
      y="258"
      fill="#FAF9F6"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="14"
      font-weight="700"
      letter-spacing="0.08em"
    >
      SPEAKADEMIC
    </text>
    <rect x="494" y="236" width="66" height="20" rx="10"
      fill="rgba(250,249,246,0.06)" />
    <text
      x="512"
      y="249"
      fill="#FAF9F6"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="9"
      font-weight="700"
      letter-spacing="0.06em"
    >
      OUTLINE
    </text>

    <rect x="288" y="286" width="48" height="48" rx="24" fill="#2D2724" />
    <rect x="352" y="280" width="60" height="60" rx="30" fill="url(#accent)" />
    <rect x="428" y="286" width="48" height="48" rx="24" fill="#2D2724" />
    <rect x="492" y="286" width="48" height="48" rx="24" fill="#2D2724" />
    <polygon points="376,296 376,324 400,310" fill="#FFF7F2" />

    <rect x="288" y="364" width="220" height="8" rx="4" fill="#3B3532" />
    <rect x="288" y="364" width="114" height="8" rx="4" fill="url(#accent)" />

    <rect x="288" y="396" width="240" height="114" rx="18" fill="#231F1D" />
    <text
      x="306"
      y="428"
      fill="#D8CEC8"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="14"
    >
      Open the outline for structure,
    </text>
    <text
      x="306"
      y="448"
      fill="#D8CEC8"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="14"
    >
      then collapse it once you are back.
    </text>
    <rect x="302" y="460" width="174" height="24" rx="12"
      fill="rgba(218,119,86,0.20)" />
    <text
      x="318"
      y="476"
      fill="#FAF9F6"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="13"
      font-weight="600"
    >
      Hidden until you need it.
    </text>

    <text
      x="638"
      y="258"
      fill="#FAF9F6"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="16"
      font-weight="700"
    >
      Outline
    </text>
    <text
      x="638"
      y="280"
      fill="#A8A29E"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="12"
    >
      Hierarchy stays readable
    </text>

    <rect x="634" y="298" width="146" height="30" rx="12"
      fill="rgba(250,249,246,0.05)" />
    <text x="650" y="317" fill="#FAF9F6"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="12" font-weight="600">1 Introduction</text>

    <text x="650" y="356" fill="#9F948D"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="11">2 Ontology of abstraction</text>

    <rect x="646" y="370" width="162" height="48" rx="16"
      fill="rgba(218,119,86,0.18)" />
    <text x="662" y="390" fill="#FAF9F6"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="12" font-weight="700">2.1 Map vs. Territory</text>
    <text x="678" y="408" fill="#FAF9F6"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="11">Current section</text>

    <text x="662" y="442" fill="#9F948D"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="11">2.2 Frames of agency</text>
    <text x="650" y="470" fill="#9F948D"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="11">3 The Causal Circularity</text>
    <text x="662" y="494" fill="#9F948D"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="11">3.1 Correcting the chain</text>
    <text x="662" y="518" fill="#9F948D"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="11">3.2 Policy implications</text>
    <text x="650" y="548" fill="#9F948D"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="11">4 Discussion</text>
    <text x="650" y="570" fill="#9F948D"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="11">5 Conclusion</text>

    <rect x="788" y="300" width="4" height="226" rx="2" fill="#3B3532" />
    <rect x="788" y="360" width="4" height="64" rx="2" fill="#F0A077" />
  </g>

  <rect x="712" y="208" width="182" height="38" rx="19" fill="#FFF8F2" />
  <text
    x="736"
    y="232"
    fill="#7B5B4E"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="14"
    font-weight="600"
  >
    Scrolls inside the panel
  </text>
</svg>
