<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="760"
  viewBox="0 0 1200 760"
  fill="none"
>
  <defs>
    <linearGradient id="bg" x1="72" y1="18" x2="1110" y2="720">
      <stop offset="0" stop-color="#FFF8F1" />
      <stop offset="1" stop-color="#F1D3C2" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DA7756" />
      <stop offset="1" stop-color="#EFA27A" />
    </linearGradient>
    <linearGradient id="panel" x1="356" y1="176" x2="918" y2="596">
      <stop offset="0" stop-color="#2B2421" />
      <stop offset="1" stop-color="#171311" />
    </linearGradient>
    <filter
      id="panelShadow"
      x="270"
      y="126"
      width="660"
      height="534"
      filterUnits="userSpaceOnUse"
      color-interpolation-filters="sRGB"
    >
      <feDropShadow dx="0" dy="20" stdDeviation="24"
        flood-color="#8E6452" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="1200" height="760" rx="36" fill="url(#bg)" />
  <text
    x="102"
    y="90"
    fill="#2D221E"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34"
    font-weight="700"
  >
    Open the outline when you need it. Hide it when you do not.
  </text>
  <text
    x="102"
    y="126"
    fill="#6C5950"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="18"
  >
    The hierarchy stays readable on long papers, highlights the current
    section, and keeps scrolling inside its own panel instead of taking over
    the page.
  </text>

  <g filter="url(#panelShadow)">
    <rect x="298" y="154" width="346" height="420" rx="28" fill="url(#panel)" />
    <rect x="298" y="154" width="346" height="4" rx="2" fill="url(#accent)" />
    <rect x="662" y="154" width="212" height="448" rx="28" fill="url(#panel)" />
    <rect x="662" y="154" width="212" height="4" rx="2" fill="url(#accent)" />

    <text
      x="326"
      y="192"
      fill="#FAF9F6"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="14"
      font-weight="700"
      letter-spacing="0.08em"
    >
      SPEAKADEMIC
    </text>
    <rect x="550" y="170" width="66" height="22" rx="11"
      fill="rgba(250,249,246,0.05)" />
    <text
      x="570"
      y="184"
      fill="#FAF9F6"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="10"
      font-weight="700"
      letter-spacing="0.06em"
    >
      OUTLINE
    </text>

    <rect x="326" y="224" width="52" height="52" rx="26" fill="#2D2724" />
    <rect x="392" y="218" width="64" height="64" rx="32" fill="url(#accent)" />
    <rect x="472" y="224" width="52" height="52" rx="26" fill="#2D2724" />
    <rect x="538" y="224" width="52" height="52" rx="26" fill="#2D2724" />
    <polygon points="416,239 416,261 435,250" fill="#FFF7F2" />

    <rect x="326" y="302" width="282" height="8" rx="4" fill="#3B3532" />
    <rect x="326" y="302" width="122" height="8" rx="4" fill="url(#accent)" />

    <rect x="326" y="334" width="282" height="112" rx="18" fill="#231F1D" />
    <text
      x="344"
      y="366"
      fill="#D8CEC8"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="15"
    >
      Open the outline for structure, then collapse it
    </text>
    <rect x="338" y="382" width="248" height="26" rx="13"
      fill="rgba(218,119,86,0.20)" />
    <text
      x="350"
      y="399"
      fill="#FAF9F6"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="15"
      font-weight="600"
    >
      once you are back in the section you want.
    </text>
    <text
      x="344"
      y="430"
      fill="#9F948D"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="15"
    >
      It stays out of the way until you ask for it again.
    </text>

    <text
      x="692"
      y="194"
      fill="#FAF9F6"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="16"
      font-weight="700"
    >
      Outline
    </text>
    <text
      x="692"
      y="218"
      fill="#A8A29E"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="13"
    >
      Hierarchy stays readable
    </text>

    <rect x="684" y="238" width="166" height="40" rx="14"
      fill="rgba(250,249,246,0.05)" />
    <text x="700" y="262" fill="#FAF9F6"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="14" font-weight="600">1 Introduction</text>

    <text x="700" y="306" fill="#9F948D"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="13">2 The Ontology of Abstraction</text>
    <rect x="696" y="320" width="160" height="52" rx="16"
      fill="rgba(218,119,86,0.16)" />
    <text x="712" y="342" fill="#FAF9F6"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="13" font-weight="700">2.1 Map vs. Territory</text>
    <text x="724" y="364" fill="#FAF9F6"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="12">Current section</text>
    <text x="716" y="398" fill="#9F948D"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="13">2.2 Frames of agency</text>
    <text x="700" y="428" fill="#9F948D"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="13">3 The Causal Circularity</text>
    <text x="716" y="452" fill="#9F948D"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="13">3.1 Correcting the chain</text>
    <text x="716" y="476" fill="#9F948D"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="13">3.2 Policy implications</text>
    <text x="700" y="506" fill="#9F948D"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="13">4 Discussion</text>
    <text x="700" y="530" fill="#9F948D"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="13">5 Conclusion</text>
    <text x="700" y="554" fill="#9F948D"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="13">Appendix</text>
  </g>

  <rect x="914" y="154" width="174" height="38" rx="19" fill="#FFF8F2" />
  <text
    x="948"
    y="178"
    fill="#7B5B4E"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="14"
    font-weight="600"
  >
    Scrolls inside the panel
  </text>
</svg>
