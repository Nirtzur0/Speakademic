<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <h1 class="popup__title">Kokoro PDF Reader</h1>

    <div id="server-status" class="popup__server-status">
      <span class="status-dot" id="status-dot"></span>
      <span id="server-text">Checking server...</span>
    </div>

    <div id="status-text" class="popup__status">Ready</div>

    <div class="popup__controls">
      <button id="btn-play" class="popup__btn popup__btn--primary" title="Play">
        &#9654;
      </button>
      <button id="btn-pause" class="popup__btn" title="Pause" disabled>
        &#9646;&#9646;
      </button>
      <button id="btn-stop" class="popup__btn" title="Stop" disabled>
        &#9632;
      </button>
    </div>

    <div id="progress" class="popup__progress" hidden>
      <span id="progress-text">0 / 0</span>
    </div>

    <div id="error" class="popup__error" hidden></div>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
