<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup__accent-bar"></div>
  <div class="popup">
    <h1 class="popup__title">
      <span class="popup__title-dot"></span>Speakademic
    </h1>

    <div id="server-status" class="popup__server-status">
      <span class="status-dot status-dot--checking" id="status-dot"></span>
      <span id="server-text">Checking server...</span>
    </div>

    <div id="pdf-info" class="popup__pdf-info" hidden>
      <div id="pdf-title" class="popup__pdf-title"></div>
    </div>

    <div id="status-text" class="popup__status">Ready</div>

    <div class="popup__controls">
      <button id="btn-skip-back" class="popup__btn popup__btn--sm"
        title="Skip back" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20" fill="currentColor" stroke="none"/><line x1="5" y1="4" x2="5" y2="20" stroke-width="2.5"/></svg>
      </button>
      <button id="btn-play" class="popup__btn popup__btn--primary"
        title="Play">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><polygon points="6 3 20 12 6 21 6 3" fill="currentColor"/></svg>
      </button>
      <button id="btn-pause" class="popup__btn"
        title="Pause" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor"/><rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor"/></svg>
      </button>
      <button id="btn-stop" class="popup__btn"
        title="Stop" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="3" fill="currentColor"/></svg>
      </button>
      <button id="btn-skip-fwd" class="popup__btn popup__btn--sm"
        title="Skip forward" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4" fill="currentColor" stroke="none"/><line x1="19" y1="4" x2="19" y2="20" stroke-width="2.5"/></svg>
      </button>
    </div>

    <div id="progress" class="popup__progress-section" hidden>
      <div class="popup__progress-bar">
        <div id="progress-fill"
          class="popup__progress-fill"></div>
      </div>
      <div class="popup__progress-row">
        <span id="progress-text">0 / 0</span>
        <span id="time-remaining"></span>
      </div>
    </div>

    <div id="section-info" class="popup__section-info" hidden>
      <span class="popup__section-label">Section:</span>
      <span id="current-section" class="popup__section-name">
      </span>
    </div>

    <div id="section-nav" class="popup__section-nav" hidden>
      <select id="section-select" class="popup__select">
        <option value="">Jump to section...</option>
      </select>
    </div>

    <div id="error" class="popup__error" hidden></div>

    <div class="popup__footer">
      <span class="popup__shortcut-hint">
        <kbd>Space</kbd> play/pause
        &middot;
        <kbd>&larr;</kbd><kbd>&rarr;</kbd> skip
        &middot;
        <kbd>&uarr;</kbd><kbd>&darr;</kbd> speed
      </span>
    </div>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
