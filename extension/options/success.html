<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speakademic — Upgrade Successful</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="options__accent-bar"></div>
  <div class="options" style="text-align: center; padding-top: 60px;">
    <div class="options__success-icon">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none"
        stroke="#22c55e" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>
    <h1 class="options__title" style="justify-content: center;">
      Upgrade Successful
    </h1>
    <p class="options__hint" style="font-size: 1rem; margin: 16px 0 32px;">
      Your plan has been upgraded. Cloud TTS is ready to use.
    </p>
    <button id="btn-go-settings" class="options__btn">
      Go to Settings
    </button>
  </div>
  <script>
    document.getElementById('btn-go-settings').addEventListener(
      'click', () => {
        window.location.href = 'options.html';
      }
    );
  </script>
</body>
</html>
