services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: speakademic
      POSTGRES_USER: speakademic
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speakademic"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://speakademic:localdev@db:5432/speakademic
      DB_SSL: "false"
      HOST: 0.0.0.0
      PORT: "3000"

volumes:
  pgdata:
